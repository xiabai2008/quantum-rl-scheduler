name: Dependency Update Check

on:
  schedule:
    - cron: "0 9 * * 1"  # 每周一 09:00 UTC
  workflow_dispatch:  # 手动触发

jobs:
  check-updates:
    name: "Check Dependency Updates"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Check for outdated packages
        run: |
          pip install -r requirements.txt
          pip list --outdated --format=columns > outdated_packages.txt
          cat outdated_packages.txt

      - name: Generate updated lock file
        run: |
          pip-compile requirements.txt -o requirements.lock.new --allow-unsafe
          diff requirements.lock requirements.lock.new || echo "Updates available"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-results
          path: |
            outdated_packages.txt
            requirements.lock.new
