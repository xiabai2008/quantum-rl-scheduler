# =============================================================================
# 量子RL调度系统 — 自动发布流水线
# Quantum RL Scheduler — Release Pipeline
#
# 触发条件：推送 v* 标签 (如 v8.0-submission)
# 执行内容：全量测试 → 提交物校验打包 → GitHub Release
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

# 确保同一时间只有一个 release 流水线运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: 全量质量门禁（冻结版本必须通过全部检查）
  # ---------------------------------------------------------------------------
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite
        run: |
          python -m pytest tests/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --timeout=120 \
            -W ignore::DeprecationWarning

      - name: Run submission validation
        run: |
          python scripts/ci/validate_submission.py --check \
            --manifest config/submission_manifest.yaml

      - name: Run authoritative metrics audit
        run: |
          python scripts/ci/audit_authoritative_metrics.py

  # ---------------------------------------------------------------------------
  # Job 2: 打包提交物
  # ---------------------------------------------------------------------------
  package:
    name: "Package Submission"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package submission artifacts
        run: |
          python scripts/ci/validate_submission.py --pack \
            --manifest config/submission_manifest.yaml

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: submission-package
          path: dist/submission_*.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: 创建 GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: submission-package
          path: dist/

      - name: Generate release notes
        run: |
          echo "## 版本: ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 提交物清单" >> release_notes.md
          echo "" >> release_notes.md
          echo "| 项目 | 状态 |" >> release_notes.md
          echo "|------|------|" >> release_notes.md
          echo "| 代码仓库 (git tag) | ✅ ${{ github.ref_name }} |" >> release_notes.md
          echo "| 代码压缩包 | ✅ 见附件 |" >> release_notes.md
          echo "| 技术白皮书 | ✅ 见仓库 |" >> release_notes.md
          echo "| 答辩 PPT | ✅ 见仓库 |" >> release_notes.md
          echo "| 演示视频 | ✅ 见仓库 |" >> release_notes.md
          echo "| 实验报告 (5份) | ✅ results/reports/ |" >> release_notes.md
          echo "| 权威模型 (2个) | ✅ deliverable_models/ |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 权威数字" >> release_notes.md
          echo "" >> release_notes.md
          echo "- PPO (14维) vs FCFS: **+86.9%** (50 seed 统计显著 p<0.001)" >> release_notes.md
          echo "- 量子占比敏感性: 50% 时 PPO 提升最高 **+94.1%**" >> release_notes.md
          echo "" >> release_notes.md
          echo "### CI 检查结果" >> release_notes.md
          echo "" >> release_notes.md
          echo "- ✅ 全量单元测试通过 (cov >= 60%)" >> release_notes.md
          echo "- ✅ 提交物校验通过" >> release_notes.md
          echo "- ✅ 权威数字审计通过" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*由 GitHub Actions Release 流水线自动生成*" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/submission_*.zip
          draft: false
          prerelease: false
          generate_release_notes: false
