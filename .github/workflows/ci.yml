# =============================================================================
# 量子RL调度系统 — CI/CD 持续集成流水线
# Quantum RL Scheduler — CI/CD Pipeline
#
# 触发条件：推送到 main 分支 or 发起 Pull Request
# 执行内容：代码格式检查 → 类型检查 → 单元测试 → 覆盖率报告
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: 代码格式检查（Black + isort + flake8）
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (black + isort + flake8)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install black>=23.0.0 isort>=5.12.0 flake8>=6.0.0 bandit>=1.7.0

      - name: Check code formatting (black)
        run: black --check --diff src/ scripts/ tests/

      - name: Check import ordering (isort)
        run: isort --check-only --diff src/ scripts/ tests/

      - name: Lint with flake8
        run: |
          flake8 src/ scripts/ tests/ \
            --count \
            --select=E,W,F,N \
            --max-line-length=100 \
            --statistics

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r src/ -ll

  # ---------------------------------------------------------------------------
  # Job 2: 单元测试 + 覆盖率（Python 多版本矩阵）
  # ---------------------------------------------------------------------------
  test:
    name: "Test (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '~\AppData\Local\pip\Cache' || '~/.cache/pip' }}
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-flakefinder  # 随机化测试顺序，发现隐式依赖

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            --timeout=120 \
            -W ignore::DeprecationWarning

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: 类型检查（mypy）
  # ---------------------------------------------------------------------------
  typecheck:
    name: "Type Check (mypy)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: |
          pip install --upgrade pip
          pip install mypy>=1.5.0

      - name: Run mypy (baseline - gradually enable strict mode)
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --follow-imports=skip \
            --no-error-unused-ignore \
            --show-error-codes \
            --pretty \
            || echo "[INFO] mypy found type issues — review and fix incrementally"

  # ---------------------------------------------------------------------------
  # Job 4: 依赖安全审计（pip-audit）
  # 自动扫描 requirements.txt 中的依赖项，检测已知漏洞（CVE/GHSA）
  # 注：初次启用 continue-on-error: true，避免历史依赖的已知漏洞阻塞流水线
  #     待团队修复或确认误报后，可移除该字段以强制阻断
  # 注：项目中暂无 requirements-dev.txt，开发依赖安全审计待后续补充
  # ---------------------------------------------------------------------------
  security-audit:
    name: "Dependency Security Audit (pip-audit)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    continue-on-error: true  # 初期允许失败：历史依赖可能存在已知漏洞，逐步修复后再强制
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on requirements.txt
        run: |
          # 扫描全部依赖；--ignore-vuln 用于跳过已确认的误报（按需补充 GHSA-ID）
          pip-audit -r requirements.txt \
            --ignore-vuln GHSA-xxxx \
            --desc

  # ---------------------------------------------------------------------------
  # Job 5: Mutation Testing（mutmut）— 评估测试质量
  # 仅对核心模块进行变异测试，避免过长的 CI 运行时间
  # 注：仅在 main 分支推送时运行，PR 中跳过（耗时较长）
  #     初期 continue-on-error: true，仅收集基线数据
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: "Mutation Testing (mutmut)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test  # 在测试通过后运行
    # 仅在 main 分支推送时运行，PR 中跳过（耗时较长）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mutmut

      - name: Run mutation testing
        run: mutmut run
        continue-on-error: true  # 初期允许失败，仅收集基线数据

      - name: Show mutation results
        run: mutmut results
        if: always()

  # ---------------------------------------------------------------------------
  # Job 6: Benchmark 性能追踪（跨版本回归检测）
  # 对比 main 分支基线，检测性能退化
  # ---------------------------------------------------------------------------
  benchmark:
    name: "Benchmark Regression Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于对比

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmarks
        run: |
          python -m pytest tests/benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark_results.json \
            -v

      - name: Track and compare benchmarks
        run: |
          python scripts/ci/benchmark_tracker.py benchmark_results.json --report

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.json
            results/benchmark_history.jsonl
