version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantum-rl-web
    restart: unless-stopped
    ports:
      - "8000:8000"  # FastAPI Web 监控面板
      - "6006:6006"  # TensorBoard（可选，需 --profile monitoring）
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - TIANYAN_MOCK_MODE=true
    volumes:
      # 持久化日志
      - ./logs:/app/logs
      # 持久化模型
      - ./models:/app/models
      # 持久化仿真结果（一键复现输出）
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: quantum-rl-tensorboard
    command: tensorboard --logdir /app/logs --host 0.0.0.0 --port 6006
    ports:
      - "6006:6006"
    volumes:
      - ./logs:/app/logs
    profiles:
      - monitoring
