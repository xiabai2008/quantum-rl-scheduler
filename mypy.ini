[mypy]
python_version = 3.12
files = src, scripts, tests
explicit_package_bases = True
namespace_packages = True
show_error_codes = True
sqlite_cache = False
cache_dir = .mypy_cache_local

# Third-party libs (torch/sb3/gymnasium/cqlib etc.) lack type stubs
ignore_missing_imports = True

# Strict type checking (Team Tech Upgrade v1 Phase 1)
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
strict_equality = True

# Transition exemptions (v8: 6 items -> 2 items)
# Exemptions already resolved and removed:
#   src.scheduler.agent / ppo_agent / networks / training
#   (added full type annotations, variable annotations, Optional[self.model] + assert narrowing)

# annealing.py (torch QUBO tensor ops, 1576 lines, extremely complex types)
[mypy-src.quantum.annealing]
ignore_errors = True

# scripts/* bulk exemption: heavy use of 3rd-party libs without type stubs
# (cqlib/qiskit/dimod etc.), scripts are for demo/testing/data processing,
# not core business logic, temporarily excluded from strict type checking
[mypy-scripts.*]
ignore_errors = True
