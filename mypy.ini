[mypy]
python_version = 3.12
files = src, scripts, tests
explicit_package_bases = True
namespace_packages = True
show_error_codes = True
sqlite_cache = False
cache_dir = .mypy_cache_local

# 第三方库（torch/sb3/gymnasium/cqlib 等）无 type stub，放宽缺失导入
ignore_missing_imports = True

# ===== 收紧类型检查（团队技术提升方案 v1 第一阶段）=====
# 所有函数必须有完整类型标注
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
# 返回 Any / 无用 ignore / 多余 cast / 严格相等
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
strict_equality = True

# ===== 过渡期豁免收敛（v8：6 项 → 2 项）=====
# 已收敛并移除的豁免（现全部通过严格类型检查）：
#   - src.scheduler.agent / ppo_agent / networks / training
#     （补全函数注解、变量注解、self.model 可空标注 + assert 收窄）
# 仍保留的 2 项豁免见下。

# annealing.py（torch QUBO 张量运算 1576 行，类型极复杂）暂保留宽松
[mypy-src.quantum.annealing]
ignore_errors = True

# scripts/* 整体豁免：脚本大量 import 无 type stub 的第三方库（cqlib/qiskit/dimod 等），
# 且脚本主要用于演示、测试和数据处理，非核心业务逻辑，暂不纳入严格类型检查
[mypy-scripts.*]
ignore_errors = True
