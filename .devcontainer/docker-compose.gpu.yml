# GPU 版本的 Docker Compose 配置
# 使用方式：docker-compose -f .devcontainer/docker-compose.gpu.yml up
#
# 前提条件：
#   1. 宿主机已安装 NVIDIA 驱动（nvidia-smi 可用）
#   2. 已安装 NVIDIA Container Toolkit
#      - Linux: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#      - Windows: Docker Desktop 4.13+ 原生支持 GPU 透传
#   3. Docker Engine 19.03+ （支持 --gpus 标志）
version: "3.8"

services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
      args:
        # 使用 NVIDIA CUDA 基础镜像
        BASE_IMAGE: "nvidia/cuda:11.8.0-cudnn8-runtime-ubuntu22.04"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ..:/workspace:cached
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"   # Web 监控界面
      - "6006:6006"   # TensorBoard
    command: sleep infinity
